name: epic-games-launcher
base: core26
version: 'latest'
summary: Epic Games Launcher – Access the Epic Games Store on Linux
description: |
  Access the Epic Games Store on Linux via the official Epic Games Launcher
  running through Wine. Browse, purchase, and download games — including free
  weekly titles — manage your library, friends list, and Unreal Engine projects.

  An internet connection is required on first launch to complete the Windows
  installer setup. The launcher will self-update after the initial install.

  This is an unofficial community snap not affiliated with Epic Games, Inc.

build-base: devel
grade: devel
confinement: strict
compression: lzo

platforms:
  amd64:

assumes:
  - snapd2.58.3

# ---------------------------------------------------------------------------
# Package repository – WineHQ stable (Wine 11) for Ubuntu 26.04 Resolute
# Key fingerprint verified from https://dl.winehq.org/wine-builds/winehq.key
# ---------------------------------------------------------------------------
package-repositories:
  - type: apt
    url: https://dl.winehq.org/wine-builds/ubuntu/
    suites: [resolute]
    components: [main]
    architectures: [amd64]
    key-id: D43F640145369C51D786DDEA76F1A20FF987672F

# ---------------------------------------------------------------------------
# Layouts – Wine 11 installs to /opt/wine-stable; bind it so Wine can find
# its own DLLs at the expected absolute path at runtime.
# ---------------------------------------------------------------------------
layout:
  /opt/wine-stable:
    bind: $SNAP/opt/wine-stable
  /usr/lib/x86_64-linux-gnu/alsa-lib:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/alsa-lib
  /usr/share/alsa:
    bind: $SNAP/usr/share/alsa

# ---------------------------------------------------------------------------
# Top-level environment – available to all apps and parts
# ---------------------------------------------------------------------------
environment:
  WINE:             "$SNAP/opt/wine-stable/bin/wine"
  WINESERVER:       "$SNAP/opt/wine-stable/bin/wineserver"
  WINEPREFIX:       "$SNAP_USER_COMMON/wine"
  WINEARCH:         win64
  WINEDLLOVERRIDES: "mscoree,mshtml="
  WINEDEBUG:        "err+module"
  DXVK_LOG_LEVEL:   none
  # Explicit DLL path so Wine's PE loader finds kernel32.dll and friends without
  # relying solely on the compiled-in default under the layout bind-mount.
  WINEDLLPATH:      "$SNAP/opt/wine-stable/lib/wine"
  LD_LIBRARY_PATH:  "$SNAP/opt/wine-stable/lib/wine/x86_64-unix:$SNAP/opt/wine-stable/lib:$SNAP/usr/lib/x86_64-linux-gnu${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

# ---------------------------------------------------------------------------
# Applications
# ---------------------------------------------------------------------------
apps:
  epic-games-launcher:
    command: bin/launch-epic
    command-chain:
      - snap/command-chain/alsa-launch
    desktop: share/applications/epic-games-launcher.desktop
    environment:
      HOME:            $SNAP_USER_COMMON
      TMPDIR:          $XDG_RUNTIME_DIR
      DISABLE_WAYLAND: "1"
      ALWAYS_USE_PULSEAUDIO: "1"
    plugs:
      - audio-playback
      - desktop
      - desktop-legacy
      - hardware-observe
      - home
      - network
      - network-bind
      - opengl
      - process-control
      - pulseaudio
      - removable-media
      - screen-inhibit-control
      - unity7
      - x11

# ---------------------------------------------------------------------------
# Parts
# ---------------------------------------------------------------------------
parts:

  # ── Wine 11 stable (WineHQ, amd64-only for win64 prefix) ─────────────────
  wine:
    plugin: nil
    stage-packages:
      - wine-stable
      - libvulkan1
      - libvkd3d1
      - fonts-wine
      - cabextract
      - unzip
      - libx11-6
      - libxext6
      - libxcb1
      - libx11-xcb1
      - libgstreamer1.0-0
      - gstreamer1.0-plugins-base
    stage:
      - opt/wine-stable/bin/
      - opt/wine-stable/lib/
      - opt/wine-stable/share/
      - usr/lib/x86_64-linux-gnu/libvulkan*
      - usr/lib/x86_64-linux-gnu/libvkd3d*
      - usr/lib/x86_64-linux-gnu/libX11.so*
      - usr/lib/x86_64-linux-gnu/libXext.so*
      - usr/lib/x86_64-linux-gnu/libxcb.so*
      - usr/lib/x86_64-linux-gnu/libX11-xcb.so*
      - usr/lib/x86_64-linux-gnu/libgstreamer-1.0.so*
      - usr/lib/x86_64-linux-gnu/libgst*.so*
      - usr/lib/x86_64-linux-gnu/gstreamer-1.0/
      - usr/share/fonts/

  # ── Epic Games Launcher MSI installer ─────────────────────────────────────
  # Downloaded at build time and bundled in the snap. The MSI is a bootstrapper
  # that will download remaining components on first launch (network required).
  epic-installer:
    plugin: nil
    build-packages:
      - wget
      - ca-certificates
    override-build: |
      mkdir -p "${SNAPCRAFT_PART_INSTALL}/usr/share/epic-games-launcher"
      wget --no-verbose --show-progress \
        --output-document="${SNAPCRAFT_PART_INSTALL}/usr/share/epic-games-launcher/EpicGamesLauncherInstaller.msi" \
        "https://launcher-public-service-prod06.ol.epicgames.com/launcher/api/installer/download/EpicGamesLauncherInstaller.msi"

  # ── Launch script and desktop entry ────────────────────────────────────────
  launcher-scripts:
    plugin: dump
    source: snap/local
    organize:
      bin/launch-epic: bin/launch-epic
      desktop/epic-games-launcher.desktop: share/applications/epic-games-launcher.desktop
    override-build: |
      craftctl default
      chmod +x "${SNAPCRAFT_PART_INSTALL}/bin/launch-epic"

  # ── ALSA audio mixin ───────────────────────────────────────────────────────
  alsa-mixin:
    plugin: dump
    source: https://github.com/diddlesnaps/snapcraft-alsa.git
    source-subdir: snapcraft-assets
    build-packages:
      - libasound2-dev
    stage-packages:
      - libasound2
      - libasound2-plugins
      - libogg0
      - libopus0
      - libmpg123-0
    stage:
      - etc/asound.conf
      - snap/command-chain/alsa-launch
      - usr/lib/*/alsa-lib
      - usr/lib/*/libasound*
      - usr/lib/*/libasyncns*
      - usr/lib/*/libFLAC*
      - usr/lib/*/libogg*
      - usr/lib/*/libopus*
      - usr/lib/*/libmpg123*
      - usr/lib/*/libpulse*
      - usr/lib/*/libsamplerate*
      - usr/lib/*/libsndfile*
      - usr/lib/*/libspeex*
      - usr/lib/*/libvorbis*
      - usr/lib/*/pulseaudio
      - usr/share/alsa
